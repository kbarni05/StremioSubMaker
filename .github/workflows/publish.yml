name: Verify Release

on:
  release:
    types: [published]

jobs:
  test:
    name: Verify release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
